<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Locksmith Near Me & Repair - Admin Hub</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
        :root { --ios-bg: #f9fafb; }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
            background-color: var(--ios-bg);
            overflow-x: hidden;
        }
        input, textarea, select { font-size: 16px !important; appearance: none; -webkit-appearance: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 10px; }
        .lucide-icon-wrapper i { display: block; }
        .animate-zoom { animation: zoom 0.15s ease-out; }
        @keyframes zoom { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
<script>
    // CONFIGURACIÓN OFICIAL Y CORREGIDA PARA TU PROYECTO
    const firebaseConfig = {
      apiKey: "AIzaSyBEswCrXBSMsnFnS2H8fZ-oxkCvAkEhrjk",
      authDomain: "gen-lang-client-0224947576.firebaseapp.com",
      databaseURL: "https://gen-lang-client-0224947576-default-rtdb.firebaseio.com",
      projectId: "gen-lang-client-0224947576",
      storageBucket: "gen-lang-client-0224947576.firebasestorage.app",
      messagingSenderId: "822057026905",
      appId: "1:822057026905:web:9dd7727a6e72b42e9f3848"
    };

    // Inicialización de la base de datos dentro del script
    if (!window.firebase.apps.length) {
      window.firebase.initializeApp(firebaseConfig);
    }
    const db = window.firebase.database();
  </script>
<script type="text/babel">
        // Icon component wrapper for Lucide icons
        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            React.useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return (
                <span className={`lucide-icon-wrapper inline-block ${className}`} {...props}>
                    <i data-lucide={name}></i>
                </span>
            );
        };

        function App() {
            const [activeModal, setActiveModal] = React.useState(null);
            const [data, setData] = React.useState({
                invoices: {}, appointments: {}, techJobs: {}, expenses: {}, payouts: {}, payrolls: {}, estimates: {}, directory: {}
            });

            // Formularios locales
            const [invoiceForm, setInvoiceForm] = React.useState({ name: '', phone: '', email: '', service: '', amount: '', cost: '', netProfit: '', status: 'PENDING', date: new Date().toLocaleDateString('en-US') });
            const [appointmentForm, setAppointmentForm] = React.useState({ name: '', phone: '', date: '', time: '', address: '', status: 'PENDING' });
            const [techJobForm, setTechJobForm] = React.useState({ techName: '', jobType: '', amountCollected: '', techFee: '', status: 'PENDING', date: new Date().toLocaleDateString('en-US') });
            const [expenseForm, setExpenseForm] = React.useState({ item: '', amount: '', category: '', date: new Date().toLocaleDateString('en-US') });
            const [payoutForm, setPayoutForm] = React.useState({ recipient: '', amount: '', description: '', status: 'PENDING', date: new Date().toLocaleDateString('en-US') });
            const [payrollForm, setPayrollForm] = React.useState({ techName: '', totalJobs: '', grossAmount: '', commissionRate: '50', totalDue: '', status: 'PENDING', date: new Date().toLocaleDateString('en-US') });
            const [estimateForm, setEstimateForm] = React.useState({ name: '', phone: '', description: '', amount: '', date: new Date().toLocaleDateString('en-US') });
            const [directoryForm, setDirectoryForm] = React.useState({ name: '', phone: '', address: '', email: '' });

            React.useEffect(() => {
                const refs = ['invoices', 'appointments', 'techJobs', 'expenses', 'payouts', 'payrolls', 'estimates', 'directory'].map(path => {
                    const r = db.ref(path);
                    r.on('value', snapshot => {
                        setData(prev => ({ ...prev, [path]: snapshot.val() || {} }));
                    });
                    return r;
                });
                return () => refs.forEach(r => r.off());
            }, []);

            // Guardado e integración inteligente con el directorio
            const saveItem = (path, form, cleanState) => {
                db.ref(path).push(form);
                if (cleanState && typeof cleanState === 'function') cleanState();

                // Auto-guardado de clientes en el Directorio
                if ((path === 'invoices' || path === 'appointments') && form.name) {
                    const alreadyExists = Object.values(data.directory).some(c => c.name?.toLowerCase() === form.name.toLowerCase());
                    if (!alreadyExists) {
                        db.ref('directory').push({
                            name: form.name,
                            phone: form.phone || '',
                            address: form.address || '',
                            email: form.email || ''
                        });
                    }
                }
            };

            const deleteItem = (path, id) => { if(confirm('¿Delete record?')) db.ref(`${path}/${id}`).remove(); };
            const toggleStatus = (path, id, current) => { db.ref(`${path}/${id}`).update({ status: current === 'PENDING' ? 'COMPLETE' : 'PENDING' }); };

            // Formatear fechas estables
            const formatDate = (dateStr) => {
                if (!dateStr) return new Date().toLocaleDateString('en-US');
                if (dateStr.includes('/')) return dateStr;
                const d = new Date(dateStr + 'T00:00:00');
                return isNaN(d.getTime()) ? dateStr : d.toLocaleDateString('en-US');
            };

            // Totales Financieros Globales (NET CENTER)
            const totals = React.useMemo(() => {
                let gross = 0, costs = 0;
                Object.values(data.invoices).forEach(i => { gross += Number(i.amount || 0); costs += Number(i.cost || 0); });
                Object.values(data.expenses).forEach(e => { costs += Number(e.amount || 0); });
                Object.values(data.payouts).forEach(p => { costs += Number(p.amount || 0); });
                Object.values(data.techJobs).forEach(t => { costs += Number(t.techFee || 0); });
                return { gross, costs, net: gross - costs };
            }, [data]);

            // Listas ordenadas
            const sortedInvoices = React.useMemo(() => Object.entries(data.invoices).reverse(), [data.invoices]);
            const sortedAppointments = React.useMemo(() => Object.entries(data.appointments).reverse(), [data.appointments]);
            const sortedTechJobs = React.useMemo(() => Object.entries(data.techJobs).reverse(), [data.techJobs]);
            const sortedExpenses = React.useMemo(() => Object.entries(data.expenses).reverse(), [data.expenses]);
            const sortedPayouts = React.useMemo(() => Object.entries(data.payouts).reverse(), [data.payouts]);
            const sortedDirectory = React.useMemo(() => Object.entries(data.directory).sort((a,b) => (a[1].name || '').localeCompare(b[1].name || '')), [data.directory]);

            // Conteo de notificaciones pendientes (círculos rojos)
            const badges = React.useMemo(() => {
                const countPending = (obj) => Object.values(obj).filter(i => i.status === 'PENDING').length;
                return {
                    invoices: countPending(data.invoices),
                    appointments: countPending(data.appointments),
                    techJobs: countPending(data.techJobs),
                    payouts: countPending(data.payouts)
                };
            }, [data]);

            return (
                <div className="max-w-md mx-auto bg-slate-50 min-h-screen pb-12 animate-zoom select-none px-4">
                    {/* Header */}
                    <div className="pt-6 pb-4 flex justify-between items-center border-b border-slate-100 bg-slate-50 sticky top-0 z-30">
                        <div>
                            <h1 className="text-xl font-black text-slate-900 tracking-tight">LOCKSMITH HUB</h1>
                            <p className="text-xs font-semibold text-slate-400 tracking-wider">ADMIN NEAR ME & REPAIR</p>
                        </div>
                        <button onClick={() => setActiveModal('financial')} className="bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white font-extrabold px-4 py-2 rounded-xl text-sm shadow-sm transition-transform flex items-center gap-1.5">
                            <Icon name="wallet" className="w-4 h-4" /> NET: ${totals.net.toFixed(2)}
                        </button>
                    </div>

                    {/* Menú Principal Grid */}
                    <div className="grid grid-cols-2 gap-3 mt-6">
                        {[
                            { id: 'invoice', label: 'New Invoice', icon: 'file-text', color: 'bg-blue-500', badge: badges.invoices },
                            { id: 'appointment', label: 'Appointment', icon: 'calendar', color: 'bg-indigo-500', badge: badges.appointments },
                            { id: 'techJob', label: 'Technical Job', icon: 'wrench', color: 'bg-amber-500', badge: badges.techJobs },
                            { id: 'expenses', label: 'Expenses', icon: 'trending-down', color: 'bg-rose-500' },
                            { id: 'payout', label: 'Payout', icon: 'dollar-sign', color: 'bg-violet-500', badge: badges.payouts },
                            { id: 'payroll', label: 'Payroll W-2', icon: 'calculator', color: 'bg-teal-500' },
                            { id: 'estimate', label: 'Estimates', icon: 'clipboard-list', color: 'bg-cyan-500' },
                            { id: 'directory', label: 'Directory', icon: 'users', color: 'bg-slate-700' }
                        ].map(b => (
                            <button key={b.id} onClick={() => setActiveModal(b.id)} className="relative flex flex-col items-center justify-center p-5 bg-white rounded-2xl border border-slate-100 shadow-sm hover:shadow-md active:scale-95 transition-all group">
                                {b.badge > 0 && <span className="absolute top-2.5 right-2.5 bg-rose-500 text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full shadow-sm">{b.badge}</span>}
                                <div className={`${b.color} text-white p-3 rounded-xl shadow-sm mb-3 group-hover:scale-105 transition-transform`}><Icon name={b.icon} className="w-5 h-5" /></div>
                                <span className="text-xs font-bold text-slate-700 tracking-wide text-center">{b.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* MODAL: NEW INVOICE */}
                    {activeModal === 'invoice' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl shadow-xl max-h-[85vh] flex flex-col animate-zoom">
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center">
                                    <h2 className="font-extrabold text-slate-900 text-base">New Invoice Form</h2>
                                    <button onClick={() => setActiveModal(null)} className="p-1 text-slate-400 bg-slate-100 rounded-full"><Icon name="x" className="w-5 h-5" /></button>
                                </div>
                                <div className="p-4 overflow-y-auto custom-scrollbar space-y-3">
                                    <input placeholder="Client Name" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden focus:border-blue-500" value={invoiceForm.name} onChange={e => setInvoiceForm({...invoiceForm, name: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-2">
                                        <input placeholder="Phone" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden focus:border-blue-500" value={invoiceForm.phone} onChange={e => setInvoiceForm({...invoiceForm, phone: e.target.value})} />
                                        <input placeholder="Email" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden focus:border-blue-500" value={invoiceForm.email} onChange={e => setInvoiceForm({...invoiceForm, email: e.target.value})} />
                                    </div>
                                    <input placeholder="Service Rendered" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden focus:border-blue-500" value={invoiceForm.service} onChange={e => setInvoiceForm({...invoiceForm, service: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-2">
                                        <input type="number" placeholder="Total Paid ($)" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden focus:border-blue-500" value={invoiceForm.amount} onChange={e => setInvoiceForm({...invoiceForm, amount: e.target.value})} />
                                        <input type="number" placeholder="Material Cost ($)" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden focus:border-blue-500" value={invoiceForm.cost} onChange={e => setInvoiceForm({...invoiceForm, cost: e.target.value})} />
                                    </div>
                                    <div className="text-left bg-slate-900 text-white p-3 rounded-xl border border-emerald-500/30">
                                        <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Net Profit</label>
                                        <div className="flex items-center gap-1">
                                            <span className="text-sm font-black text-emerald-400">$</span>
                                            <input type="number" placeholder="0.00" className="w-full bg-transparent text-white text-sm font-bold outline-hidden placeholder:text-slate-600" value={invoiceForm.netProfit} onChange={e => setInvoiceForm({...invoiceForm, netProfit: e.target.value})} />
                                        </div>
                                    </div>
                                    <button onClick={() => saveItem('invoices', invoiceForm, () => setInvoiceForm({name:'', phone:'', email:'', service:'', amount:'', cost:'', netProfit:'', status:'PENDING', date: new Date().toLocaleDateString('en-US')}))} className="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold p-3.5 rounded-xl text-sm transition-colors">Save Invoice</button>
                                    <hr className="border-slate-100" />
                                    <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar">
                                        <h3 className="text-xs font-black text-slate-400 uppercase tracking-wider">Historical Records</h3>
                                        {sortedInvoices.map(([id, i]) => (
                                            <div key={id} className="p-3 bg-slate-50 border border-slate-100 rounded-xl flex justify-between items-center text-xs">
                                                <div className="text-left space-y-0.5">
                                                    <p className="font-extrabold text-slate-800">{i.name}</p>
                                                    <p className="text-slate-500 font-semibold">{i.service} • <span className="text-blue-600">${Number(i.amount).toFixed(2)}</span></p>
                                                    <p className="text-[10px] text-slate-400 font-medium">{formatDate(i.date)}</p>
                                                </div>
                                                <div className="flex items-center gap-1.5">
                                                    <button onClick={() => toggleStatus('invoices', id, i.status)} className={`${i.status === 'COMPLETE' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'} font-black px-2.5 py-1 rounded-md text-[10px]`}>{i.status}</button>
                                                    <button onClick={() => deleteItem('invoices', id)} className="text-rose-500 p-1 bg-white border border-slate-200 rounded-md"><Icon name="trash" className="w-3.5 h-3.5" /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: APPOINTMENTS */}
                    {activeModal === 'appointment' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl shadow-xl max-h-[85vh] flex flex-col animate-zoom">
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center">
                                    <h2 className="font-extrabold text-slate-900 text-base">Schedule Appointment</h2>
                                    <button onClick={() => setActiveModal(null)} className="p-1 text-slate-400 bg-slate-100 rounded-full"><Icon name="x" className="w-5 h-5" /></button>
                                </div>
                                <div className="p-4 overflow-y-auto custom-scrollbar space-y-3">
                                    <input placeholder="Client Name" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={appointmentForm.name} onChange={e => setAppointmentForm({...appointmentForm, name: e.target.value})} />
                                    <input placeholder="Phone" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={appointmentForm.phone} onChange={e => setAppointmentForm({...appointmentForm, phone: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-2">
                                        <input type="date" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden text-slate-600" value={appointmentForm.date} onChange={e => setAppointmentForm({...appointmentForm, date: e.target.value})} />
                                        <input type="time" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden text-slate-600" value={appointmentForm.time} onChange={e => setAppointmentForm({...appointmentForm, time: e.target.value})} />
                                    </div>
                                    <input placeholder="Service Address" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={appointmentForm.address} onChange={e => setAppointmentForm({...appointmentForm, address: e.target.value})} />
                                    <button onClick={() => saveItem('appointments', appointmentForm, () => setAppointmentForm({name:'', phone:'', date:'', time:'', address:'', status:'PENDING'}))} className="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold p-3.5 rounded-xl text-sm transition-colors">Book Order</button>
                                    <hr className="border-slate-100" />
                                    <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar text-xs">
                                        <h3 className="text-xs font-black text-slate-400 uppercase tracking-wider">Schedule</h3>
                                        {sortedAppointments.map(([id, a]) => (
                                            <div key={id} className="p-3 bg-slate-50 border border-slate-100 rounded-xl text-left space-y-1">
                                                <div className="flex justify-between items-center">
                                                    <p className="font-extrabold text-slate-800">{a.name}</p>
                                                    <div className="flex items-center gap-1.5">
                                                        <button onClick={() => toggleStatus('appointments', id, a.status)} className={`${a.status === 'COMPLETE' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'} font-black px-2.5 py-1 rounded-md text-[10px]`}>{a.status}</button>
                                                        <button onClick={() => deleteItem('appointments', id)} className="text-rose-500 p-1 bg-white border border-slate-200 rounded-md"><Icon name="trash" className="w-3.5 h-3.5" /></button>
                                                    </div>
                                                </div>
                                                <p className="text-slate-500 font-semibold flex items-center gap-1">{a.phone && <span className="text-emerald-600 font-bold">{a.phone}</span>} • {formatDate(a.date)} @ {a.time}</p>
                                                {a.address && (
                                                    <p className="text-slate-400 font-medium flex items-center gap-1 text-[11px] bg-white border border-slate-100 p-1.5 rounded-md mt-1">
                                                        <Icon name="map-pin" className="w-3 h-3 text-indigo-500" /> {a.address}
                                                    </p>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: TECHNICAL JOB */}
                    {activeModal === 'techJob' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl shadow-xl max-h-[85vh] flex flex-col animate-zoom">
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center">
                                    <h2 className="font-extrabold text-slate-900 text-base">Technical Job Log</h2>
                                    <button onClick={() => setActiveModal(null)} className="p-1 text-slate-400 bg-slate-100 rounded-full"><Icon name="x" className="w-5 h-5" /></button>
                                </div>
                                <div className="p-4 overflow-y-auto custom-scrollbar space-y-3">
                                    <input placeholder="Technician Name" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={techJobForm.techName} onChange={e => setTechJobForm({...techJobForm, techName: e.target.value})} />
                                    <input placeholder="Job Description / Type" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={techJobForm.jobType} onChange={e => setTechJobForm({...techJobForm, jobType: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-2">
                                        <input type="number" placeholder="Total Collected ($)" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={techJobForm.amountCollected} onChange={e => setTechJobForm({...techJobForm, amountCollected: e.target.value})} />
                                        <input type="number" placeholder="Tech Fee Paid ($)" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={techJobForm.techFee} onChange={e => setTechJobForm({...techJobForm, techFee: e.target.value})} />
                                    </div>
                                    <button onClick={() => saveItem('techJobs', techJobForm, () => setTechJobForm({techName:'', jobType:'', amountCollected:'', techFee:'', status:'PENDING', date: new Date().toLocaleDateString('en-US')}))} className="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold p-3.5 rounded-xl text-sm transition-colors">Log Job</button>
                                    <hr className="border-slate-100" />
                                    <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar text-xs">
                                        <h3 className="text-xs font-black text-slate-400 uppercase tracking-wider">Records</h3>
                                        {sortedTechJobs.map(([id, t]) => {
                                            const myProfit = Number(t.amountCollected || 0) - Number(t.techFee || 0);
                                            return (
                                                <div key={id} className="p-3 bg-slate-50 border border-slate-100 rounded-xl flex justify-between items-center">
                                                    <div className="text-left space-y-0.5">
                                                        <p className="font-extrabold text-slate-800">{t.techName} <span className="font-normal text-slate-400">({t.jobType})</span></p>
                                                        <p className="text-slate-500 font-semibold flex gap-2">
                                                            <span className="text-emerald-600 font-bold">Me: ${myProfit.toFixed(2)}</span>
                                                            <span className="text-rose-500 font-bold">Tech: ${Number(t.techFee || 0).toFixed(2)}</span>
                                                        </p>
                                                        <p className="text-[10px] text-slate-400 font-medium">{formatDate(t.date)}</p>
                                                    </div>
                                                    <div className="flex items-center gap-1.5">
                                                        <button onClick={() => toggleStatus('techJobs', id, t.status)} className={`${t.status === 'COMPLETE' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'} font-black px-2.5 py-1 rounded-md text-[10px]`}>{t.status}</button>
                                                        <button onClick={() => deleteItem('techJobs', id)} className="text-rose-500 p-1 bg-white border border-slate-200 rounded-md"><Icon name="trash" className="w-3.5 h-3.5" /></button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: EXPENSES */}
                    {activeModal === 'expenses' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl shadow-xl max-h-[85vh] flex flex-col animate-zoom">
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center">
                                    <h2 className="font-extrabold text-slate-900 text-base">Company Expenses</h2>
                                    <button onClick={() => setActiveModal(null)} className="p-1 text-slate-400 bg-slate-100 rounded-full"><Icon name="x" className="w-5 h-5" /></button>
                                </div>
                                <div className="p-4 overflow-y-auto custom-scrollbar space-y-3">
                                    <input placeholder="Expense Item / Supplier" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={expenseForm.item} onChange={e => setExpenseForm({...expenseForm, item: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-2">
                                        <input type="number" placeholder="Amount ($)" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={expenseForm.amount} onChange={e => setExpenseForm({...expenseForm, amount: e.target.value})} />
                                        <select className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-semibold outline-hidden text-slate-600" value={expenseForm.category} onChange={e => setExpenseForm({...expenseForm, category: e.target.value})}>
                                            <option value="">Category</option>
                                            <option value="Hardware">Hardware</option>
                                            <option value="Gas / Fuel">Gas / Fuel</option>
                                            <option value="Marketing">Marketing</option>
                                            <option value="Tools">Tools</option>
                                        </select>
                                    </div>
                                    <button onClick={() => saveItem('expenses', expenseForm, () => setExpenseForm({item:'', amount:'', category:'', date: new Date().toLocaleDateString('en-US')}))} className="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold p-3.5 rounded-xl text-sm transition-colors">Log Expense</button>
                                    <hr className="border-slate-100" />
                                    <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar text-xs">
                                        <h3 className="text-xs font-black text-slate-400 uppercase tracking-wider">Expense History</h3>
                                        {sortedExpenses.map(([id, e]) => (
                                            <div key={id} className="p-3 bg-slate-50 border border-slate-100 rounded-xl flex justify-between items-center">
                                                <div className="text-left">
                                                    <p className="font-extrabold text-slate-800">{e.item}</p>
                                                    <p className="text-slate-400 text-[10px] font-semibold">{e.category} • {formatDate(e.date)}</p>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <span className="font-extrabold text-rose-600">-${Number(e.amount).toFixed(2)}</span>
                                                    <button onClick={() => deleteItem('expenses', id)} className="text-rose-500 p-1 bg-white border border-slate-200 rounded-md"><Icon name="trash" className="w-3.5 h-3.5" /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: PAYOUTS */}
                    {activeModal === 'payout' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl shadow-xl max-h-[85vh] flex flex-col animate-zoom">
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center">
                                    <h2 className="font-extrabold text-slate-900 text-base">Partner Payouts</h2>
                                    <button onClick={() => setActiveModal(null)} className="p-1 text-slate-400 bg-slate-100 rounded-full"><Icon name="x" className="w-5 h-5" /></button>
                                </div>
                                <div className="p-4 overflow-y-auto custom-scrollbar space-y-3">
                                    <input placeholder="Recipient Name" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={payoutForm.recipient} onChange={e => setPayoutForm({...payoutForm, recipient: e.target.value})} />
                                    <input type="number" placeholder="Amount ($)" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={payoutForm.amount} onChange={e => setPayoutForm({...payoutForm, amount: e.target.value})} />
                                    <input placeholder="Description" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={payoutForm.description} onChange={e => setPayoutForm({...payoutForm, description: e.target.value})} />
                                    <button onClick={() => saveItem('payouts', payoutForm, () => setPayoutForm({recipient:'', amount:'', description:'', status:'PENDING', date: new Date().toLocaleDateString('en-US')}))} className="w-full bg-violet-500 hover:bg-violet-600 text-white font-bold p-3.5 rounded-xl text-sm transition-colors">Log Payout</button>
                                    <hr className="border-slate-100" />
                                    <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar text-xs">
                                        <h3 className="text-xs font-black text-slate-400 uppercase tracking-wider">Payout Record</h3>
                                        {sortedPayouts.map(([id, p]) => (
                                            <div key={id} className="p-3 bg-slate-50 border border-slate-100 rounded-xl flex justify-between items-center">
                                                <div className="text-left">
                                                    <p className="font-extrabold text-slate-800">{p.recipient}</p>
                                                    <p className="text-slate-400 text-[10px] font-semibold">{p.description} • {formatDate(p.date)}</p>
                                                </div>
                                                <div className="flex items-center gap-1.5">
                                                    <span className="font-black text-blue-600">${Number(p.amount || 0).toFixed(2)}</span>
                                                    <button onClick={() => toggleStatus('payouts', id, p.status)} className={`${p.status === 'COMPLETE' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'} font-black px-2.5 py-1 rounded-md text-[10px]`}>{p.status}</button>
                                                    <button onClick={() => deleteItem('payouts', id)} className="text-rose-500 p-1 bg-white border border-slate-200 rounded-md"><Icon name="trash" className="w-3.5 h-3.5" /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: PAYROLL W-2 */}
                    {activeModal === 'payroll' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl shadow-xl max-h-[85vh] flex flex-col animate-zoom">
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center">
                                    <h2 className="font-extrabold text-slate-900 text-base">Payroll W-2 Estimator</h2>
                                    <button onClick={() => setActiveModal(null)} className="p-1 text-slate-400 bg-slate-100 rounded-full"><Icon name="x" className="w-5 h-5" /></button>
                                </div>
                                <div className="p-4 overflow-y-auto custom-scrollbar space-y-3 text-left">
                                    <input placeholder="Employee Name" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={payrollForm.techName} onChange={e => setPayrollForm({...payrollForm, techName: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-2">
                                        <input type="number" placeholder="Total Jobs" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={payrollForm.totalJobs} onChange={e => setPayrollForm({...payrollForm, totalJobs: e.target.value})} />
                                        <input type="number" placeholder="Gross Amount ($)" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={payrollForm.grossAmount} onChange={e => setPayrollForm({...payrollForm, grossAmount: e.target.value})} />
                                    </div>
                                    <input type="number" placeholder="Commission Rate (%)" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={payrollForm.commissionRate} onChange={e => setPayrollForm({...payrollForm, commissionRate: e.target.value})} />
                                    
                                    {/* Lógica de Nómina en Tiempo Real Blindada contra errores de toFixed */}
                                    {(() => {
                                        const gross = Number(payrollForm.grossAmount || 0);
                                        const rate = Number(payrollForm.commissionRate || 0) / 100;
                                        const earnings = gross * rate;
                                        const tax = earnings * 0.15;
                                        const finalNet = earnings - tax;
                                        return (
                                            <div className="bg-slate-900 text-white rounded-xl p-4 space-y-2 text-xs font-medium">
                                                <div className="flex justify-between"><span>Gross Commission ({payrollForm.commissionRate}%):</span><span className="font-bold text-emerald-400">${earnings.toFixed(2)}</span></div>
                                                <div className="flex justify-between text-rose-400"><span>Estimated W-2 Taxes (15%):</span><span>-${tax.toFixed(2)}</span></div>
                                                <div className="flex justify-between border-t border-slate-800 pt-2 text-sm font-black"><span>Net Payment Due:</span><span className="text-blue-400">${finalNet.toFixed(2)}</span></div>
                                            </div>
                                        );
                                    })()}

                                    <button onClick={() => {
                                        const gross = Number(payrollForm.grossAmount || 0);
                                        const rate = Number(payrollForm.commissionRate || 0) / 100;
                                        const finalDue = (gross * rate) * 0.85;
                                        saveItem('payrolls', { ...payrollForm, totalDue: finalDue.toFixed(2) }, () => setPayrollForm({techName:'', totalJobs:'', grossAmount:'', commissionRate:'50', totalDue:'', status:'PENDING', date: new Date().toLocaleDateString('en-US')}));
                                    }} className="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold p-3.5 rounded-xl text-sm transition-colors">Log Payroll Statement</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: ESTIMATES */}
                    {activeModal === 'estimate' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl shadow-xl max-h-[85vh] flex flex-col animate-zoom">
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center">
                                    <h2 className="font-extrabold text-slate-900 text-base">Job Estimates (50/50 Terms)</h2>
                                    <button onClick={() => setActiveModal(null)} className="p-1 text-slate-400 bg-slate-100 rounded-full"><Icon name="x" className="w-5 h-5" /></button>
                                </div>
                                <div className="p-4 overflow-y-auto custom-scrollbar space-y-3 text-left">
                                    <input placeholder="Client Name" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={estimateForm.name} onChange={e => setEstimateForm({...estimateForm, name: e.target.value})} />
                                    <input placeholder="Phone" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={estimateForm.phone} onChange={e => setEstimateForm({...estimateForm, phone: e.target.value})} />
                                    <input placeholder="Estimate Value ($)" type="number" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden" value={estimateForm.amount} onChange={e => setEstimateForm({...estimateForm, amount: e.target.value})} />
                                    <textarea placeholder="Job Details / Materials" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-hidden h-20 resize-none" value={estimateForm.description} onChange={e => setEstimateForm({...estimateForm, description: e.target.value})}></textarea>
                                    
                                    <div className="bg-amber-50 border border-amber-200 text-amber-950 p-3 rounded-xl text-[11px] font-medium leading-relaxed">
                                        <p className="font-bold mb-1">Legal Terms (Auto-Included):</p>
                                        "A 50% deposit is required upfront to secure parts and scheduling. The remaining 50% balance is due immediately upon satisfactory completion of the locksmith services."
                                    </div>

                                    <button onClick={() => saveItem('estimates', estimateForm, () => setEstimateForm({name:'', phone:'', description:'', amount:'', date: new Date().toLocaleDateString('en-US')}))} className="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold p-3.5 rounded-xl text-sm transition-colors">Generate Estimate</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: DIRECTORY */}
                    {activeModal === 'directory' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl shadow-xl max-h-[85vh] flex flex-col animate-zoom">
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center">
                                    <h2 className="font-extrabold text-slate-900 text-base">Clients Directory</h2>
                                    <button onClick={() => setActiveModal(null)} className="p-1 text-slate-400 bg-slate-100 rounded-full"><Icon name="x" className="w-5 h-5" /></button>
                                </div>
                                <div className="p-4 overflow-y-auto custom-scrollbar space-y-3">
                                    <div className="space-y-2 max-h-96 overflow-y-auto custom-scrollbar text-xs">
                                        {sortedDirectory.map(([id, c]) => (
                                            <div key={id} className="p-3 bg-slate-50 border border-slate-100 rounded-xl text-left flex justify-between items-center">
                                                <div>
                                                    <p className="font-black text-slate-800 text-sm">{c.name}</p>
                                                    <p className="text-emerald-600 font-bold mt-0.5">{c.phone || 'No phone'}</p>
                                                    {c.address && <p className="text-slate-400 font-medium text-[11px] mt-0.5">{c.address}</p>}
                                                </div>
                                                <button onClick={() => deleteItem('directory', id)} className="text-rose-500 p-1.5 bg-white border border-slate-200 rounded-md shadow-2xs"><Icon name="trash" className="w-4 h-4" /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: NET FINANCIAL CENTER */}
                    {activeModal === 'financial' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl shadow-xl animate-zoom">
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center">
                                    <h2 className="font-extrabold text-slate-900 text-base">Financial Overview</h2>
                                    <button onClick={() => setActiveModal(null)} className="p-1 text-slate-400 bg-slate-100 rounded-full"><Icon name="x" className="w-5 h-5" /></button>
                                </div>
                                <div className="p-6 space-y-4 text-sm font-semibold text-left">
                                    <div className="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                                        <span className="text-slate-500">Gross Revenue (Invoices Total):</span>
                                        <span className="font-black text-blue-600 text-base">${totals.gross.toFixed(2)}</span>
                                    </div>
                                    <div className="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                                        <span className="text-slate-500">Total Operational Costs:</span>
                                        <span className="font-black text-rose-500 text-base">-${totals.costs.toFixed(2)}</span>
                                    </div>
                                    <div className="flex justify-between items-center bg-slate-900 text-white p-4 rounded-xl border-2 border-emerald-500">
                                        <span className="text-slate-300 font-bold">Net Real Profit:</span>
                                        <span className="font-black text-emerald-400 text-xl">${totals.net.toFixed(2)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
ReactDOM.createRoot(document.getElementById('root')).render(<App />);            );
);
}

const rootElement = document.getElementById('root') || document.body;
ReactDOM.createRoot(rootElement).render(<App />);
</script>
</html>
